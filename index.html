<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conversor de Monedas</title>
</head>

<body style="background-color: black; color: white; display: flex; flex-direction: column; align-items: center; ">
    <h1>Conversor de monedas</h1>

    <div
        style="background-color: gray; display: flex; flex-direction: column; align-items: center; width: 300px; padding: 20px; border-radius: 10px;">
        <h3>Pesos Chilenos</h3>
        <input type="text" id="monto" placeholder="Ingrese el monto "
            style="padding: 10px; border-radius: 5px; border: none;">
        <p>Moneda a convertir</p>
        <select name="" id="moneda"
            style="height: 30px; width: 200px; margin: 10px; border-radius: 5px; border: none; ">
            <option value="dolar">Dolar</option>
            <option value="euro">Euro</option>
            <option value="uf">UF</option>
        </select>
        <Button id="convertir"
            style="height: 30px; width: 200px; margin: 10px; border-radius: 5px; border: none; background-color: rgb(9, 121, 121); color: white; ">
            Buscar</Button>
        <p id="resultado"></p>
    </div>

   

    <script src="./js/script.js"></script>
</body>

</html>
